<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>找慶祝 · 台北精選甜點地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #C2185B;
  --rose-light: #FCE4EC;
  --rose-mid: #E91E8C;
  --cream: #FFF8F3;
  --warm: #F5E6D0;
  --brown: #3D2B1F;
  --brown-mid: #8B5E3C;
  --gray: #6B7280;
  --white: #FFFFFF;
  --border: rgba(194,24,91,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; }

/* Header */
.header { background: var(--white); border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--rose); letter-spacing: .02em; }
.logo span { font-style: italic; color: var(--brown-mid); font-size: 1rem; margin-left: .5rem; font-family: 'DM Sans', sans-serif; font-weight: 300; }
.header-count { font-size: .8rem; color: var(--gray); }

/* Hero */
.hero { background: var(--white); padding: 3rem 2rem 2rem; text-align: center; border-bottom: 1px solid var(--border); }
.hero-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.5rem); color: var(--brown); line-height: 1.2; margin-bottom: .75rem; }
.hero-title em { color: var(--rose); font-style: italic; }
.hero-sub { font-family: 'Noto Serif TC', serif; font-size: .95rem; color: var(--brown-mid); font-weight: 300; margin-bottom: 2rem; letter-spacing: .04em; }

/* Search */
.search-wrap { max-width: 520px; margin: 0 auto 1.5rem; position: relative; }
.search-input { width: 100%; padding: .875rem 1.25rem .875rem 3rem; border: 1.5px solid var(--border); border-radius: 50px; font-size: .95rem; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--brown); outline: none; transition: border-color .2s; }
.search-input:focus { border-color: var(--rose); background: var(--white); }
.search-icon { position: absolute; left: 1.1rem; top: 50%; transform: translateY(-50%); color: var(--rose); font-size: 1.1rem; pointer-events: none; }

/* Filters */
.filters { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; padding-bottom: .25rem; }
.filter-btn { padding: .4rem 1rem; border-radius: 50px; border: 1px solid var(--border); background: var(--white); color: var(--brown-mid); font-size: .8rem; cursor: pointer; transition: all .2s; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
.filter-btn:hover, .filter-btn.active { background: var(--rose); color: var(--white); border-color: var(--rose); }

/* Grid */
.main { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem; }
.results-info { font-size: .85rem; color: var(--gray); margin-bottom: 1.5rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }

/* Card */
.card { background: var(--white); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); transition: transform .25s, box-shadow .25s; cursor: pointer; }
.card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(194,24,91,.12); }
.card-img { height: 200px; overflow: hidden; position: relative; background: var(--warm); }
.card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
.card:hover .card-img img { transform: scale(1.05); }
.card-badge { position: absolute; top: 10px; left: 10px; font-size: .7rem; padding: 3px 9px; border-radius: 20px; font-weight: 500; letter-spacing: .03em; }
.badge-custom { background: var(--rose); color: var(--white); }
.badge-featured { background: var(--brown); color: var(--white); }
.badge-new { background: #7B1FA2; color: var(--white); }
.card-body { padding: 1.25rem; }
.card-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--brown); margin-bottom: .3rem; line-height: 1.3; }
.card-style { font-size: .78rem; color: var(--rose); margin-bottom: .6rem; font-weight: 500; letter-spacing: .02em; }
.card-desc { font-size: .82rem; color: var(--gray); line-height: 1.65; margin-bottom: .875rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: .75rem; }
.card-price { font-size: .85rem; font-weight: 500; color: var(--rose); }
.card-hours { font-size: .75rem; color: var(--gray); }
.card-footer { padding: 0 1.25rem 1.25rem; display: flex; gap: .5rem; }
.btn-ig { flex: 1; padding: .55rem; border-radius: 8px; border: 1px solid var(--border); background: var(--cream); color: var(--brown-mid); font-size: .78rem; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: .35rem; transition: all .2s; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.btn-ig:hover { background: var(--rose-light); border-color: var(--rose); color: var(--rose); }
.btn-tel { flex: 1; padding: .55rem; border-radius: 8px; border: 1px solid var(--rose); background: var(--rose); color: var(--white); font-size: .78rem; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: .35rem; transition: all .2s; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.btn-tel:hover { background: #a31650; }

/* Empty state */
.empty { text-align: center; padding: 4rem 2rem; color: var(--gray); }
.empty-icon { font-size: 3rem; margin-bottom: 1rem; }
.empty p { font-family: 'Noto Serif TC', serif; font-size: 1rem; }

/* Footer */
footer { background: var(--brown); color: rgba(255,255,255,.6); text-align: center; padding: 2rem; font-size: .8rem; margin-top: 4rem; }
footer strong { color: var(--white); }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(61,43,31,.6); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 20px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal-img { height: 240px; overflow: hidden; border-radius: 20px 20px 0 0; }
.modal-img img { width: 100%; height: 100%; object-fit: cover; }
.modal-body { padding: 1.75rem; }
.modal-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--brown); margin-bottom: .25rem; }
.modal-style { font-size: .85rem; color: var(--rose); font-weight: 500; margin-bottom: 1rem; }
.modal-desc { font-size: .9rem; color: var(--gray); line-height: 1.75; margin-bottom: 1.25rem; font-family: 'Noto Serif TC', serif; font-weight: 300; }
.modal-info { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1.5rem; }
.modal-row { display: flex; gap: .75rem; font-size: .85rem; }
.modal-key { color: var(--brown-mid); font-weight: 500; min-width: 70px; }
.modal-val { color: var(--brown); flex: 1; }
.modal-actions { display: flex; gap: .75rem; }
.modal-close { position: absolute; top: 1rem; right: 1rem; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.9); border: none; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; color: var(--brown); }
.modal-wrap { position: relative; }

@media(max-width: 600px) {
  .header { padding: 1rem; }
  .hero { padding: 2rem 1rem 1.5rem; }
  .main { padding: 1.5rem 1rem; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">找慶祝 <span>台北精選甜點</span></div>
  <div class="header-count" id="header-count">11 家店</div>
</div>

<div class="hero">
  <h1 class="hero-title">台北最好吃的蛋糕<br><em>都在這裡了</em></h1>
  <p class="hero-sub">精選 11 家職人甜點工作室 · 法式 · 日式 · 韓式 · 訂製</p>
  <div class="search-wrap">
    <span class="search-icon">&#9825;</span>
    <input class="search-input" type="text" id="search" placeholder="搜尋店名、風格、口味…" oninput="renderCards()">
  </div>
  <div class="filters" id="filters"></div>
</div>

<div class="main">

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="empty-icon">&#9825;</div>

<footer>

  },
  {

    rating: 4.8,

    hours: "每日 11:00–19:00（售完為止）",
    desc: "台灣版日式低甜度乳酪蛋糕，口感綿密細緻，每日限量販售，常常中午前售罄。",
    ig: "https://instagram.com/mrcheesecake.tw",
    custom: false,
    price: "NT$420 起",
    days: 0,
    badge: ""
  }
];

const allTags = ["全部", "法式", "日式", "韓式", "訂製", "生日", "無麩質", "婚禮", "翻糖", "乳酪"];
let activeTag = "全部";

function buildFilters() {
  const f = document.getElementById("filters");
  f.innerHTML = allTags.map(t =>
    `<button class="filter-btn${t === activeTag ? " active" : ""}" onclick="setTag('${t}')">${t}</button>`
  ).join("");
}

function setTag(t) {
  activeTag = t;
  buildFilters();
  renderCards();
}

function renderCards() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = shops.filter(s => {
    const matchTag = activeTag === "全部" || s.style.includes(activeTag);
    const matchQ = !q || s.name.toLowerCase().includes(q) || s.style.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q);
    return matchTag && matchQ;
  });
  document.getElementById("results-info").textContent = `共找到 ${filtered.length} 家`;
  document.getElementById("header-count").textContent = `${filtered.length} 家店`;
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  if (!filtered.length) { grid.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";
  grid.innerHTML = filtered.map((s, i) => {
    const badgeMap = { custom: "可訂製", featured: "主廚推薦", new: "新加入" };
    const badge = s.badge ? `<div class="card-badge badge-${s.badge}">${badgeMap[s.badge]}</div>` : "";
    return `<div class="card" onclick="openModal(${shops.indexOf(s)})">
      <div class="card-img">
        <img src="${s.img}" alt="${s.name}" loading="lazy">
        ${badge}
      </div>
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-style">${s.style}</div>
        <div class="card-desc">${s.desc}</div>
        <div class="card-meta">
          <span class="card-price">${s.price}</span>
          <span class="card-hours">${s.hours.split("｜")[0].split(" ")[0]}</span>
        </div>
      </div>
      <div class="card-footer">
        <a class="btn-ig" href="${s.ig}" target="_blank" onclick="event.stopPropagation()">&#9825; Instagram</a>
        <div class="btn-tel" onclick="event.stopPropagation();alert('${s.phone}')"># 聯絡方式</div>
      </div>
    </div>`;
  }).join("");
}

function openModal(i) {
  const s = shops[i];
  document.getElementById("modal-img").src = s.img;
  document.getElementById("modal-img").alt = s.name;
  document.getElementById("modal-name").textContent = s.name;
  document.getElementById("modal-style").textContent = s.style;
  document.getElementById("modal-desc").textContent = s.desc;
  document.getElementById("modal-info").innerHTML = `
    <div class="modal-row"><span class="modal-key">地址</span><span class="modal-val">${s.address}</span></div>
    <div class="modal-row"><span class="modal-key">營業時間</span><span class="modal-val">${s.hours}</span></div>
    <div class="modal-row"><span class="modal-key">聯絡方式</span><span class="modal-val">${s.phone}</span></div>
    <div class="modal-row"><span class="modal-key">最低價格</span><span class="modal-val">${s.price}</span></div>
    <div class="modal-row"><span class="modal-key">可訂製</span><span class="modal-val">${s.custom ? "是，建議提前 " + (s.days||3) + " 天預訂" : "否，現場購買"}</span></div>
  `;
  document.getElementById("modal-actions").innerHTML = `
    <a class="btn-tel" href="${s.ig}" target="_blank" style="flex:1;text-decoration:none">&#9825; 前往 Instagram</a>
  `;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e.target === document.getElementById("modal")) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
}

buildFilters();
renderCards();
</script>
